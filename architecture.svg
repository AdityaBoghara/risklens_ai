<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" width="900" height="680" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="680" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">RiskLens AI — System Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#666">Streamlit · Pure-Python Engine · Optional LLM · Local Persistence</text>

  <!-- ── Layer 1: User ── -->
  <rect x="300" y="76" width="300" height="44" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="450" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#3949ab">User / Browser</text>

  <!-- Arrow user → UI -->
  <line x1="450" y1="120" x2="450" y2="144" stroke="#5c6bc0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Layer 2: Streamlit UI ── -->
  <rect x="60" y="144" width="780" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="450" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d47a1">Streamlit UI — app.py</text>

  <!-- UI sub-boxes -->
  <rect x="80"  y="180" width="130" height="48" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="145" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Questionnaire</text>
  <text x="145" y="215" text-anchor="middle" font-size="9" fill="#333">Org type · 4-pt scale</text>
  <text x="145" y="227" text-anchor="middle" font-size="9" fill="#333">answer collection</text>

  <rect x="225" y="180" width="130" height="48" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="290" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Risk Dashboard</text>
  <text x="290" y="215" text-anchor="middle" font-size="9" fill="#333">Score · radar chart</text>
  <text x="290" y="227" text-anchor="middle" font-size="9" fill="#333">trend · peer table</text>

  <rect x="370" y="180" width="130" height="48" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="435" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">What-If Simulator</text>
  <text x="435" y="215" text-anchor="middle" font-size="9" fill="#333">Fix preview · bundle</text>
  <text x="435" y="227" text-anchor="middle" font-size="9" fill="#333">score delta view</text>

  <rect x="515" y="180" width="130" height="48" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="580" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Action Plan</text>
  <text x="580" y="215" text-anchor="middle" font-size="9" fill="#333">Top actions · quick</text>
  <text x="580" y="227" text-anchor="middle" font-size="9" fill="#333">wins · AI report</text>

  <rect x="660" y="180" width="160" height="48" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="740" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Export / History</text>
  <text x="740" y="215" text-anchor="middle" font-size="9" fill="#333">CSV download</text>
  <text x="740" y="227" text-anchor="middle" font-size="9" fill="#333">change narrative</text>

  <!-- ── Arrows UI → Core modules ── -->
  <!-- to scoring -->
  <line x1="200" y1="244" x2="200" y2="300" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- to simulator -->
  <line x1="370" y1="244" x2="330" y2="300" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- to report -->
  <line x1="540" y1="244" x2="540" y2="300" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- to benchmarks -->
  <line x1="700" y1="244" x2="700" y2="300" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- to history -->
  <line x1="780" y1="244" x2="820" y2="300" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Layer 3: Core modules ── -->

  <!-- scoring.py -->
  <rect x="60" y="300" width="200" height="140" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="160" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">scoring.py</text>
  <text x="160" y="338" text-anchor="middle" font-size="10" fill="#2e7d32">Risk Calculation Engine</text>
  <line x1="80" y1="344" x2="240" y2="344" stroke="#388e3c" stroke-width="0.8"/>
  <text x="160" y="360" text-anchor="middle" font-size="9" fill="#333">• Org-type weight overrides</text>
  <text x="160" y="374" text-anchor="middle" font-size="9" fill="#333">• Per-category scoring</text>
  <text x="160" y="388" text-anchor="middle" font-size="9" fill="#333">• ROI = risk×time / effort</text>
  <text x="160" y="402" text-anchor="middle" font-size="9" fill="#333">• Dependency blocking</text>
  <text x="160" y="416" text-anchor="middle" font-size="9" fill="#333">• Threat tag aggregation</text>
  <text x="160" y="430" text-anchor="middle" font-size="9" fill="#555">→ score, findings, top_actions</text>

  <!-- simulator.py -->
  <rect x="278" y="300" width="200" height="140" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <text x="378" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">simulator.py</text>
  <text x="378" y="338" text-anchor="middle" font-size="10" fill="#bf360c">What-If Simulator</text>
  <line x1="298" y1="344" x2="458" y2="344" stroke="#f9a825" stroke-width="0.8"/>
  <text x="378" y="360" text-anchor="middle" font-size="9" fill="#333">• simulate_fix(answers, id)</text>
  <text x="378" y="374" text-anchor="middle" font-size="9" fill="#333">• simulate_top_fixes(N)</text>
  <text x="378" y="388" text-anchor="middle" font-size="9" fill="#333">• simulate_bundle(ids)</text>
  <text x="378" y="402" text-anchor="middle" font-size="9" fill="#333">• Re-scores after each fix</text>
  <text x="378" y="416" text-anchor="middle" font-size="9" fill="#333">• Threats eliminated</text>
  <text x="378" y="430" text-anchor="middle" font-size="9" fill="#555">→ delta, level change</text>

  <!-- report.py -->
  <rect x="496" y="300" width="200" height="140" rx="8" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
  <text x="596" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#880e4f">report.py</text>
  <text x="596" y="338" text-anchor="middle" font-size="10" fill="#ad1457">AI Report Generator</text>
  <line x1="516" y1="344" x2="676" y2="344" stroke="#c2185b" stroke-width="0.8"/>
  <text x="596" y="360" text-anchor="middle" font-size="9" fill="#333">• build_llm_payload(results)</text>
  <text x="596" y="374" text-anchor="middle" font-size="9" fill="#333">• generate_ai_report()</text>
  <text x="596" y="388" text-anchor="middle" font-size="9" fill="#333">• gpt-4o-mini (if API key)</text>
  <text x="596" y="402" text-anchor="middle" font-size="9" fill="#333">• demo_report() fallback</text>
  <text x="596" y="416" text-anchor="middle" font-size="9" fill="#333">• 30-day action plan</text>
  <text x="596" y="430" text-anchor="middle" font-size="9" fill="#555">→ 6-section narrative</text>

  <!-- benchmarks.py -->
  <rect x="714" y="300" width="126" height="140" rx="8" fill="#ede7f6" stroke="#7b1fa2" stroke-width="2"/>
  <text x="777" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a148c">benchmarks.py</text>
  <text x="777" y="334" text-anchor="middle" font-size="9" fill="#6a1b9a">Peer Comparison</text>
  <line x1="730" y1="340" x2="824" y2="340" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="777" y="356" text-anchor="middle" font-size="9" fill="#333">• Sector baselines</text>
  <text x="777" y="370" text-anchor="middle" font-size="9" fill="#333">• get_baseline(org)</text>
  <text x="777" y="384" text-anchor="middle" font-size="9" fill="#333">• peer_comparison()</text>
  <text x="777" y="398" text-anchor="middle" font-size="9" fill="#333">• ±3 threshold</text>
  <text x="777" y="412" text-anchor="middle" font-size="9" fill="#333">• 5 sector types</text>
  <text x="777" y="430" text-anchor="middle" font-size="9" fill="#555">→ deltas, status</text>

  <!-- ── Arrows core → data ── -->
  <line x1="160" y1="440" x2="290" y2="494" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="378" y1="440" x2="378" y2="494" stroke="#f9a825" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="596" y1="440" x2="460" y2="494" stroke="#c2185b" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- ── Layer 4: Data layer ── -->

  <!-- data.py -->
  <rect x="220" y="494" width="320" height="80" rx="8" fill="#efebe9" stroke="#5d4037" stroke-width="2"/>
  <text x="380" y="516" text-anchor="middle" font-size="13" font-weight="bold" fill="#3e2723">data.py — Question Registry</text>
  <text x="380" y="532" text-anchor="middle" font-size="9" fill="#555">Question dataclass · answer/urgency factors · category order</text>
  <text x="380" y="546" text-anchor="middle" font-size="9" fill="#555">ORG_TYPE_WEIGHT_OVERRIDES · org_relevance boosts</text>
  <text x="380" y="560" text-anchor="middle" font-size="9" fill="#555">loads from questions.json at startup</text>

  <!-- history.py -->
  <rect x="570" y="494" width="170" height="80" rx="8" fill="#e0f7fa" stroke="#00838f" stroke-width="2"/>
  <text x="655" y="516" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">history.py</text>
  <text x="655" y="532" text-anchor="middle" font-size="9" fill="#555">save_assessment()</text>
  <text x="655" y="546" text-anchor="middle" font-size="9" fill="#555">get_last_assessment()</text>
  <text x="655" y="560" text-anchor="middle" font-size="9" fill="#555">get_all_assessments()</text>

  <!-- Arrow data.py → questions.json -->
  <line x1="300" y1="574" x2="200" y2="610" stroke="#5d4037" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <!-- Arrow history.py → assessment_history.json -->
  <line x1="655" y1="574" x2="730" y2="610" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <!-- Arrow history.py ← UI -->
  <line x1="820" y1="300" x2="720" y2="574" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ── Layer 5: Storage ── -->
  <rect x="60" y="610" width="270" height="52" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="195" y="632" text-anchor="middle" font-size="12" font-weight="bold" fill="#424242">questions.json</text>
  <text x="195" y="652" text-anchor="middle" font-size="9" fill="#666">Question bank · weights · remediation · framework_map</text>

  <rect x="590" y="610" width="250" height="52" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="715" y="632" text-anchor="middle" font-size="12" font-weight="bold" fill="#424242">assessment_history.json</text>
  <text x="715" y="652" text-anchor="middle" font-size="9" fill="#666">Time-series scores · categories · threats · quick wins</text>

  <!-- ── External: OpenAI ── -->
  <rect x="714" y="200" width="168" height="44" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="798" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">OpenAI API</text>
  <text x="798" y="234" text-anchor="middle" font-size="9" fill="#888">gpt-4o-mini (optional)</text>

  <!-- Arrow report.py → OpenAI (bi-directional lines) -->
  <line x1="696" y1="380" x2="798" y2="344" stroke="#e65100" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
  <line x1="798" y1="300" x2="696" y2="380" stroke="#e65100" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <!-- Legend -->
  <rect x="60" y="610" width="0" height="0"/>
  <g transform="translate(60, 670)">
    <rect width="14" height="10" rx="2" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="18" y="9" font-size="9" fill="#444">UI Layer</text>
    <rect x="90" width="14" height="10" rx="2" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="108" y="9" font-size="9" fill="#444">Core Engine</text>
    <rect x="200" width="14" height="10" rx="2" fill="#efebe9" stroke="#5d4037" stroke-width="1"/>
    <text x="218" y="9" font-size="9" fill="#444">Data / Config</text>
    <rect x="310" width="14" height="10" rx="2" fill="#fafafa" stroke="#9e9e9e" stroke-width="1"/>
    <text x="328" y="9" font-size="9" fill="#444">Persistence</text>
    <line x1="410" y1="5" x2="440" y2="5" stroke="#e65100" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text x="446" y="9" font-size="9" fill="#444">Optional / External</text>
  </g>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#777"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e65100"/>
    </marker>
  </defs>
</svg>
